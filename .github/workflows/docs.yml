name: 📚 Docs

on:
  push:
    branches: [main]
  workflow_dispatch:

# 用 GitHub Pages "GitHub Actions" 源（非 gh-pages 分支）。
# `actions/configure-pages` 的 `enablement: true` 会在仓库未启用 Pages 时自动启用，
# 免去手动到 Settings → Pages 点击的步骤（需要 GITHUB_TOKEN 有仓库 admin 权限，
# 同仓 workflow 默认满足）。
permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build typedoc HTML
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: pnpm
      - run: pnpm install
      - run: pnpm -F mce build:doc:html
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./packages/mce/html-docs

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
