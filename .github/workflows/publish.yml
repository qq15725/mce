name: 🚀 Publish Package

on:
  push:
    tags:
      - 'v*' # Push events to matching v*, i.e. v1.0, v20.15.10

permissions:
  id-token: write
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: Release
    steps:
      - name: ⤵️ Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: 🎉 Install pnpm
        uses: pnpm/action-setup@v4
      - name: 🎉 Set node version to 22
        uses: actions/setup-node@v4
        with:
          # 固定到 Node 22：lts/* 会解析到 Node 24，其自带 npm 被 `npm install -g
          # npm@latest` 就地覆盖升级时会丢失 sigstore 子依赖，导致 OIDC provenance
          # 发布时报 Cannot find module 'sigstore'。
          node-version: 22
          registry-url: https://registry.npmjs.org/
          cache: pnpm
      - name: ⬆️ Upgrade npm (OIDC trusted publishing requires npm >= 11.5.1)
        run: npm install -g npm@latest
      - name: 🚧 Install deps
        run: pnpm install
      - name: 📦 Build
        run: pnpm run build
      - name: 🔀 Publish package
        run: pnpm run publish
